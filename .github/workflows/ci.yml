name: Commerce Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Capture install result
        shell: bash
        run: |
          set -o pipefail
          git clone --quiet --depth 1 --branch "$GITHUB_HEAD_REF" "https://github.com/$GITHUB_REPOSITORY.git" source
          cd source
          npx --yes pnpm@11.9.0 install --no-frozen-lockfile --network-concurrency=4 --child-concurrency=1 --reporter=append-only 2>&1 | tail -n 50
