name: Commerce Validation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
        env:
          TC_POSTGRES_DSN: postgres://terra:terra@localhost:5432/terra_commerce
          TC_REDIS_URL: redis://localhost:6379/0
          TC_COMMERCE_JWT_SECRET: test-only-secret-with-at-least-32-characters
          TC_COMMERCE_COOKIE_SECRET: test-only-cookie-secret-with-at-least-32-characters
